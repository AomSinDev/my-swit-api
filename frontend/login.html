<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIT - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 8px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 36px;
            font-size: 0.9rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            color: #374151;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Chakra Petch', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .google-btn:hover {
            border-color: var(--primary);
            background: #f5f3ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79,70,229,0.2);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .error-msg {
            margin-top: 20px;
            padding: 12px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .divider {
            margin: 24px 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .privacy-note {
            color: #94a3b8;
            font-size: 0.75rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🚀</div>
    <h1>SWIT</h1>
    <p class="subtitle">Supabase Online System</p>

    <!--
        ปุ่มนี้จะ redirect ไปที่ /api/auth/login
        ซึ่ง api-gateway จะสร้าง Google OAuth URL และ redirect ต่อไปยัง Google
    -->
    <a href="/api/auth/login" class="google-btn">
        <!-- Google "G" Logo SVG -->
        <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        เข้าสู่ระบบด้วย Google
    </a>

    <div id="errorMsg" class="error-msg"></div>

    <p class="divider">— ข้อมูลของคุณ —</p>
    <p class="privacy-note">
        ข้อมูลที่บันทึกจะเชื่อมกับบัญชี Google ของคุณ<br>
        คุณเห็นและแก้ไขได้เฉพาะข้อมูลของตัวเองเท่านั้น
    </p>
</div>

<script>
    // ถ้า URL มี ?error=... แสดง error message
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
        const msg = document.getElementById('errorMsg');
        msg.style.display = 'block';
        if (error === 'access_denied') {
            msg.textContent = '⚠️ คุณยกเลิกการเข้าสู่ระบบ';
        } else {
            msg.textContent = '❌ เกิดข้อผิดพลาด กรุณาลองใหม่';
        }
    }
</script>

</body>
</html>
