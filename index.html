<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIT - Supabase Online System</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .status-msg {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }

        th {
            background-color: #f1f5f9;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 SWIT Supabase System</h2>
    
    <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="name" placeholder="กรอกชื่อของคุณ">
    </div>

    <div class="form-group">
        <label>คะแนน</label>
        <input type="number" id="score" placeholder="กรอกคะแนน">
    </div>

    <button onclick="saveData()">💾 บันทึกข้อมูล</button>

    <div id="status" class="status-msg"></div>

    <h3>📊 ประวัติการบันทึก</h3>
    <table id="historyTable">
        <thead>
            <tr>
                <th>วัน-เวลา</th>
                <th>ชื่อ</th>
                <th>คะแนน</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // ตั้งค่า URL ของ API (ใช้ window.location.origin เพื่อให้รันได้ทั้ง Local และ Render)
    const API_URL = window.location.origin + '/api';

    // 1. ฟังก์ชันบันทึกข้อมูล
    async function saveData() {
        const name = document.getElementById('name').value;
        const score = document.getElementById('score').value;
        const status = document.getElementById('status');

        if (!name || !score) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            return;
        }

        try {
            status.style.display = 'block';
            status.style.backgroundColor = '#fef3c7';
            status.innerText = "⏳ กำลังบันทึกข้อมูล...";

            const res = await fetch(`${API_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score })
            });

            const result = await res.json();

            if (result.success) {
                status.style.backgroundColor = '#d1fae5';
                status.style.color = '#065f46';
                status.innerText = "✅ บันทึกลง Supabase สำเร็จ!";
                
                // ล้างค่าในฟอร์ม
                document.getElementById('name').value = '';
                document.getElementById('score').value = '';
                
                // โหลดตารางใหม่
                loadHistory();
            } else {
                throw new Error(result.error);
            }
        } catch (err) {
            status.style.display = 'block';
            status.style.backgroundColor = '#fee2e2';
            status.style.color = '#991b1b';
            status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
        }
    }

    // 2. ฟังก์ชันโหลดประวัติจาก Supabase
    async function loadHistory() {
        try {
            const res = await fetch(`${API_URL}/history`);
            const data = await res.json();
            const tbody = document.querySelector('#historyTable tbody');
            
            if (Array.isArray(data)) {
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td style="font-size: 0.85em; color: #64748b;">
                            ${new Date(item.created_at).toLocaleString('th-TH')}
                        </td>
                        <td><b>${item.name}</b></td>
                        <td>${item.score}</td>
                    </tr>
                `).join(''); // Supabase เรียงลำดับมาให้แล้วจาก Backend
            }
        } catch (err) {
            console.error("Load history error:", err);
        }
    }

    // โหลดข้อมูลทันทีที่เปิดหน้าเว็บ
    window.onload = loadHistory;
</script>

</body>
</html>
