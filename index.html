<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIT1 - API Online System</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Chakra Petch', sans-serif; background-color: var(--bg); padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: var(--primary); }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
        .status-msg { padding: 15px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h2>🚀 SWIT1 Online API</h2>
    <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
    <input type="number" id="score" placeholder="คะแนน">
    <button onclick="saveData()">💾 บันทึกข้อมูล</button>
    <div id="status" class="status-msg"></div>
    <table id="historyTable">
        <thead><tr><th>ลำดับ</th><th>ชื่อ</th><th>คะแนน</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // ดึง URL อัตโนมัติจากหน้าเว็บที่เปิดอยู่
    const API_URL = window.location.origin + '/api';

    async function saveData() {
        const name = document.getElementById('name').value;
        const score = document.getElementById('score').value;
        const status = document.getElementById('status');
        if(!name || !score) return alert("กรุณากรอกข้อมูล");

        try {
            status.style.display = 'block'; status.innerText = "⏳ กำลังบันทึก...";
            const res = await fetch(`${API_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score })
            });
            const data = await res.json();
            if(data.success) {
                status.innerText = "✅ บันทึกสำเร็จ!";
                loadHistory();
            }
        } catch (e) { status.innerText = "❌ ติดต่อ Server ไม่ได้"; }
    }

    async function loadHistory() {
        try {
            const res = await fetch(`${API_URL}/history`);
            const data = await res.json();
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = data.map(item => `
                <tr><td>${item['ลำดับ'] || '-'}</td><td>${item['ชื่อ']}</td><td>${item['คะแนน']}</td></tr>
            `).reverse().join('');
        } catch (e) { console.error(e); }
    }
    window.onload = loadHistory;
</script>
</body>
</html>
